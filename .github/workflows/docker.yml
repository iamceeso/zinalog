name: Build and publish Docker image

on:
  push:
    branches: ["main"]
    tags: ["v*"]

  pull_request:
    branches: ["main"]

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Capture build metadata
        id: metadata
        run: |
          echo "app_version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "app_commit_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build app
        env:
          APP_VERSION: ${{ steps.metadata.outputs.app_version }}
          APP_COMMIT_SHA: ${{ steps.metadata.outputs.app_commit_sha }}
          NEXT_PUBLIC_APP_VERSION: ${{ steps.metadata.outputs.app_version }}
          NEXT_PUBLIC_APP_COMMIT_SHA: ${{ steps.metadata.outputs.app_commit_sha }}
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          build-args: |
            APP_VERSION=${{ steps.metadata.outputs.app_version }}
            APP_COMMIT_SHA=${{ steps.metadata.outputs.app_commit_sha }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/zinalog:latest
